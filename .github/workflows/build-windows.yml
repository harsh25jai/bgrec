# Production release: bump version in pyproject.toml on main → auto tag → build → GitHub Release + OTA manifest.
#
# Release flow:
#   1. Edit version in pyproject.toml (e.g. 0.0.1 → 0.0.2)
#   2. Push/merge to main
#   3. This workflow tags v0.0.2 and publishes bgrec-Windows.zip + latest.json
#   4. Installed bgrec clients auto-update via OTA

name: Release Windows (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_release:
        description: "Release current pyproject.toml version even if unchanged"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.plan.outputs.should_release }}
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide release from pyproject.toml version
        id: plan
        env:
          FORCE: ${{ github.event.inputs.force_release }}
        run: |
          set -euo pipefail
          NEW=$(python scripts/read_version.py)
          TAG="v${NEW}"
          SHOULD=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$FORCE" = "true" ]; then
              SHOULD=true
            else
              SHOULD=true
            fi
          else
            if ! git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qx 'pyproject.toml'; then
              echo "pyproject.toml not changed — skipping release"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "version=$NEW" >> "$GITHUB_OUTPUT"
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            BEFORE=$(git show "${{ github.event.before }}:pyproject.toml" 2>/dev/null || true)
            OLD=$(echo "$BEFORE" | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/' || echo "")
            if [ -z "$OLD" ]; then
              SHOULD=true
            elif [ "$OLD" != "$NEW" ]; then
              SHOULD=true
              echo "Version bump: $OLD -> $NEW"
            else
              echo "pyproject.toml changed but version unchanged ($NEW) — skipping release"
            fi
          fi

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            if [ "$SHOULD" = "true" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$FORCE" = "true" ]; then
              echo "Force release: will rebuild assets for existing tag"
            elif [ "$SHOULD" = "true" ]; then
              echo "Tag exists — skip (bump version in pyproject.toml to release again)"
              SHOULD=false
            fi
          fi

          echo "should_release=$SHOULD" >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-release:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync app/version.py from pyproject.toml
        run: python scripts/sync_version_from_pyproject.py

      - name: Create and push git tag
        if: github.event_name == 'push'
        env:
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already on repo — continuing to build"
          else
            git tag -a "$TAG" -m "Release $VERSION"
            git push origin "$TAG"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-windows.txt
          pip install -e .

      - name: Write bundled OTA metadata
        shell: bash
        run: echo "${{ github.repository }}" > config/github-repo.txt

      - name: Build executable
        run: python scripts/build_exe.py

      - name: Package release ZIP
        shell: pwsh
        run: ./scripts/package-windows-release.ps1 -Channel release

      - name: Generate OTA manifest
        run: python scripts/generate_update_manifest.py --github-repo ${{ github.repository }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: |
            dist/bgrec-Windows.zip
            dist/bgrec.exe
            dist/latest.json
          generate_release_notes: true

      - name: Release summary
        shell: pwsh
        run: |
          @"
          ## Released ${{ needs.version.outputs.tag }}

          | Asset | OTA |
          |-------|-----|
          | ``bgrec-Windows.zip`` | Download + install |
          | ``latest.json`` | ``bgrec`` auto-update manifest |
          | ``bgrec.exe`` | Binary only |

          Clients on **${{ needs.version.outputs.version }}** or older will pick this up automatically when ``[update].auto_apply`` is enabled.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
