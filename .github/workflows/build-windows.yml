# pyproject.toml on main → tag v* → Windows build → GitHub Release + latest.json (OTA)

name: Release Windows (main)

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml
      - app/version.py
      - .github/workflows/build-windows.yml
  workflow_dispatch:
    inputs:
      force_release:
        description: "Rebuild current pyproject.toml version (even if tag exists)"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-windows-${{ github.repository }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork }}
    permissions:
      contents: write
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
      tag: ${{ steps.ver.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}
      did_push: ${{ steps.sync.outputs.did_push }}
      commit_sha: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read pyproject.toml version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python scripts/read_version.py)"
          [[ -n "$VERSION" ]] || { echo "::error::Empty version in pyproject.toml"; exit 1; }
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using ${TAG} at ${GITHUB_SHA}"

      - name: Decide if this push should release
        id: plan
        shell: bash
        env:
          FORCE: ${{ github.event.inputs.force_release || 'false' }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
          REPO: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: bash scripts/ci_release_plan.sh

      - name: Ensure tag at commit
        id: sync
        if: steps.plan.outputs.should_plan == 'true'
        shell: bash
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: bash scripts/ci_release_sync_tag.sh

      - name: Ensure GitHub Release exists
        if: steps.plan.outputs.should_plan == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
          REPO: ${{ github.repository }}
        run: bash scripts/ci_release_ensure_gh.sh

      - name: Gate Windows build job
        id: gate
        shell: bash
        env:
          SHOULD_PLAN: ${{ steps.plan.outputs.should_plan }}
        run: |
          set -euo pipefail
          if [[ "$SHOULD_PLAN" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-release:
    needs: tag
    if: ${{ !github.event.repository.fork && needs.tag.outputs.should_build == 'true' }}
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # Build the commit that triggered this workflow (not an old tag pointer).
      # Retries use current main; tag vX.Y.Z is attached to this same SHA in the tag job.
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.commit_sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify checkout
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/verify_version_from_pyproject.py
          test -f scripts/build_exe.py
          echo "Building commit $(git rev-parse HEAD) for ${{ needs.tag.outputs.tag }}"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-windows.txt
          pip install -e .

      - name: Verify version from pyproject.toml
        shell: bash
        run: python scripts/verify_version_from_pyproject.py

      - name: Verify Drive discovery documents
        shell: bash
        run: python scripts/verify_drive_discovery.py

      - name: Write bundled OTA metadata
        shell: bash
        run: echo "${{ github.repository }}" > config/github-repo.txt

      - name: Build executable
        shell: bash
        run: python scripts/build_exe.py

      - name: Package release ZIP
        shell: pwsh
        run: ./scripts/package-windows-release.ps1 -Channel release

      - name: Generate OTA manifest
        shell: bash
        run: python scripts/generate_update_manifest.py --github-repo ${{ github.repository }}

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: ${{ needs.tag.outputs.tag }}
          draft: false
          files: |
            dist/bgrec-Windows.zip
            dist/bgrec.exe
            dist/latest.json
          generate_release_notes: true

      - name: Release summary
        shell: pwsh
        run: |
          @"
          ## Released ${{ needs.tag.outputs.tag }}

          | Asset | Purpose |
          |-------|---------|
          | bgrec-Windows.zip | Portable install |
          | latest.json | OTA manifest |
          | bgrec.exe | Binary |

          OTA clients will upgrade to **${{ needs.tag.outputs.version }}** automatically.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
